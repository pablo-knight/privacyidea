iname: Test GitLab API & Trigger Pipeline

on:
  push:
    tags:
      - '*'  # Triggert die Action bei jedem neuen Tag

jobs:
  test-and-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Test GitLab API Erreichbarkeit
        run: |
          API_URL=${{ vars.GITLAB_URL_API }}
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ GitLab API ist erreichbar!"
          else
            echo "❌ Fehler: GitLab API antwortet mit Statuscode $HTTP_STATUS"
            exit 1
          fi

      - name: Debug GitHub Tag Name
        run: |
          echo "GITHUB_REF: $GITHUB_REF"
          echo "Extracted Tag: ${GITHUB_REF#refs/tags/}"
        env:
          GITHUB_REF_NAME: ${GITHUB_REF#refs/tags/}

      - name: Trigger GitLab CI/CD Pipeline
        run: |
          curl --request POST "${{ vars.GITLAB_URL_PIPELINE_ID_2 }}/api/v4/projects/${{ vars.GITLAB_PROJECT_ID }}/trigger/pipeline" \
               --form "token=$GITLAB_TRIGGER_TOKEN" \
               --form "ref=$GITHUB_REF_NAME"
        env:
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          GITHUB_REF_NAME: ${GITHUB_REF#refs/tags/}
